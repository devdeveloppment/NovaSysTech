version: "1"
services:
  - type: web
    name: novasystech-web
    env: python
    rootDir: novasystech
    buildCommand: "./build.sh"
    startCommand: "gunicorn novasystech.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: novasystech-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      # Cloudinary credentials to be added in the Render dashboard manually
      # - key: CLOUDINARY_CLOUD_NAME
      # - key: CLOUDINARY_API_KEY
      # - key: CLOUDINARY_API_SECRET

databases:
  - name: novasystech-db
    databaseName: novasystech
    user: novasystech_user
